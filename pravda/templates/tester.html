<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тестер — Правда или Действие</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>Тестовая страница</h1>
    <nav>
      <a href="/admin">Админка</a>
      <a href="/docs" target="_blank">Swagger</a>
    </nav>
  </header>

  <section class="card">
    <h2>Получить случайную фразу</h2>
    <form class="row" method="get" action="/tester">
      <label>
        Тип
        <select name="type">
          <option value="random" {% if type=='random' %}selected{% endif %}>Random</option>
          <option value="truth" {% if type=='truth' %}selected{% endif %}>Truth</option>
          <option value="dare" {% if type=='dare' %}selected{% endif %}>Dare</option>
        </select>
      </label>
      <label>
        Категория
        <select name="category">
          {% for c in categories %}
            <option value="{{ c }}" {% if category==c %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </label>
      <button type="submit" class="btn">Показать</button>
    </form>
    <div class="phrase" style="font-size:1.4rem; padding: 12px 0;">{{ phrase }}</div>
  </section>

</body>
</html>
